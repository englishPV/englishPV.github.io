<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1,
             viewport-fit=cover, maximum-scale=1,
             user-scalable=no" />
  <title>Physique Flashcards</title>

  <!-- Connexions anticipées -->
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="dns-prefetch"
    href="https://englishpv-b6727-default-rtdb.europe-west1.firebasedatabase.app" />

  <!-- CSS critique INLINE (zéro requête réseau) -->
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      height: 100%; margin: 0; overflow: hidden;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont,
                   "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    :root {
      --bg: #0b1020; --surface: #12172b; --text: #e6ecff;
      --primary: #6366f1; --border: #232a48; --muted: #8aa0d3;
    }
    [data-theme="light"] {
      --bg: #f8fafc; --surface: #fff; --text: #0f172a;
      --primary: #3b82f6; --border: #cbd5e1; --muted: #475569;
    }
    body { background: var(--bg); color: var(--text); }

    #splash {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px;
      background: var(--bg);
      transition: opacity .3s ease-out;
    }
    #splash .spinner {
      width: 36px; height: 36px;
      border: 3px solid color-mix(in srgb, var(--primary) 25%, transparent);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: sp .6s linear infinite;
    }
    @keyframes sp { to { transform: rotate(360deg) } }

    .wrapper {
      height: 100dvh; width: 100%;
      display: flex; align-items: center; justify-content: center;
    }
    .phone {
      height: 100%; width: 100%; max-width: 100%;
      display: grid;
      grid-template-rows: 52px 1fr 0px 0px;
      min-height: 0; overflow: hidden;
    }
    .topbar {
      display: flex; align-items: center; padding: 0 10px;
    }
    main#view {
      min-height: 0; overflow: hidden; padding: 8px;
    }
    .hidden { display: none !important; }
  </style>

  <!-- CSS complet en non-bloquant -->
  <link rel="preload" href="css/01_styles_theme_and_layout.css"
        as="style" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript>
    <link rel="stylesheet" href="css/01_styles_theme_and_layout.css" />
  </noscript>
</head>
<body>

  <!-- Splash instantané -->
  <div id="splash">
    <div class="spinner"></div>
    <div style="font-size:13px;font-weight:600;color:var(--muted)">
      Chargement…
    </div>
  </div>

  <div class="wrapper">
    <div class="phone" id="app">
      <header class="topbar">
        <button class="back hidden" id="backBtn"
                title="Retour">← Retour</button>
        <div class="title" id="title">Deck</div>
        <div style="flex:1"></div>
        <button class="btn btn--ghost btn--tiny" id="syncBtn"
          style="flex-shrink:0;width:auto;padding:6px 12px"
          title="Sync">🔄</button>
        <a href="https://schedulepv.web.app/" target="_blank"
           rel="noopener"
           class="btn btn--primary btn--tiny"
           style="flex-shrink:0;text-decoration:none;
                  width:auto;padding:6px 12px">📅</a>
      </header>

      <main id="view"></main>

      <div class="bottom-actions" id="bottomActions">
        <button class="action btn" id="cardsBtn">Cartes</button>
        <button class="action btn" id="settingsBtn">Paramètres</button>
      </div>

      <footer class="revision-bar" id="revisionBar">
        <button id="startReviewBtn"
                class="rev-btn btn btn--solid btn--primary">
          Révision
        </button>
      </footer>

      <footer id="reviewActionsBar" class="review-actions-bar"
              aria-live="polite"></footer>
    </div>
  </div>

  <!-- MathJax config (pas de téléchargement) -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$','$'],['\\(','\\)']],
        displayMath: [['$$','$$'],['\\[','\\]']],
        processEscapes: true
      },
      options: { skipHtmlTags: ['script','style','textarea'] },
      startup: { typeset: false }
    };
    let _mathJaxLoading = null;
    window.loadMathJax = function() {
      if (window.MathJax?.typesetPromise) return Promise.resolve();
      if (_mathJaxLoading) return _mathJaxLoading;
      _mathJaxLoading = new Promise((res, rej) => {
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js';
        s.onload = function() {
          (function check() {
            window.MathJax?.typesetPromise ? res() : setTimeout(check, 50);
          })();
        };
        s.onerror = rej;
        document.head.appendChild(s);
      });
      return _mathJaxLoading;
    };
  </script>

  <!-- Data léger -->
  <script src="data.js"></script>

  <!-- Firebase : 1 fichier au lieu de 3 -->
  <script defer
    src="https://www.gstatic.com/firebasejs/10.12.2/firebase-compat.js">
  </script>

  <!-- App scripts -->
  <script defer src="js/01_firebase_sync.js"></script>
  <script defer src="js/02_utils_formatting_and_helpers.js"></script>
  <script defer src="js/03_data_storage_and_imports.js"></script>
  <script defer src="js/04_srs_algorithm_and_stats.js"></script>
  <script defer src="js/05_app_ui_and_navigation.js"></script>
</body>
</html>
