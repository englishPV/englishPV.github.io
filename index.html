  <!-- CSS critique inline (zéro requête réseau → splash instantané) -->
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      height: 100%; margin: 0; overflow: hidden;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont,
                   "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    :root {
      --bg: #0b1020; --surface: #12172b; --text: #e6ecff;
      --primary: #6366f1; --primary-600: #5457e6;
      --border: #232a48; --muted: #8aa0d3;
      --green: #22c55e; --blue: #3b82f6; --amber: #f59e0b; --red: #ef4444;
      --fs-term: 20px; --fs-def: 24px; --radius-md: 14px;
      --btn-neutral-bg: rgba(255,255,255,.06);
      --btn-neutral-fg: #e6ecff;
      --btn-neutral-bd: #232a48;
      --btn-soft-primary-bg: color-mix(in srgb,var(--primary) 22%,transparent);
      --btn-soft-primary-fg: #dbe4ff;
      --btn-soft-primary-bd: color-mix(in srgb,var(--primary) 55%,transparent);
      --btn-solid-primary-bg: var(--primary);
      --btn-solid-primary-fg: #fff;
      --btn-solid-primary-bd: var(--primary-600);
    }
    [data-theme="light"] {
      --bg: #f8fafc; --surface: #fff; --text: #0f172a;
      --primary: #3b82f6; --primary-600: #2563eb;
      --border: #cbd5e1; --muted: #475569;
      --btn-neutral-bg: #f1f5f9;
      --btn-neutral-fg: #0f172a;
      --btn-neutral-bd: #cbd5e1;
      --btn-soft-primary-bg: color-mix(in srgb,var(--primary) 14%,white 86%);
      --btn-soft-primary-fg: color-mix(in srgb,var(--primary) 78%,black 22%);
      --btn-soft-primary-bd: color-mix(in srgb,var(--primary) 35%,white 65%);
    }
    body { background: var(--bg); color: var(--text); font-size: 17px; }

    /* Splash */
    #splash {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px;
      background: var(--bg);
      transition: opacity .3s ease-out;
    }
    #splash .spinner {
      width: 36px; height: 36px;
      border: 3px solid color-mix(in srgb, var(--primary) 25%, transparent);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: sp .6s linear infinite;
    }
    @keyframes sp { to { transform: rotate(360deg) } }

    /* Layout squelette */
    .wrapper {
      height: 100dvh; width: 100%;
      display: flex; align-items: center; justify-content: center;
      padding: env(safe-area-inset-top) env(safe-area-inset-right)
               env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    .phone {
      aspect-ratio: 9/16; height: 100%; width: auto;
      max-width: 100%; max-height: 100%;
      display: grid;
      grid-template-rows: var(--row-top,52px) 1fr var(--row-actions,0px) var(--row-rev,0px);
      position: relative; min-height: 0;
      touch-action: pan-y; overflow: hidden;
    }
    @media(min-width: 1024px) {
      .phone { aspect-ratio: auto; width: 100%; height: 100dvh; }
    }
    .topbar {
      position: sticky; top: 0; z-index: 10;
      display: flex; align-items: center; padding: 0 10px;
    }
    .topbar .back {
      appearance: none; border: 0; outline: 0; background: 0 0;
      color: var(--text); padding: 8px 10px; margin-right: 4px;
      border-radius: 10px; display: flex; align-items: center;
      gap: 8px; cursor: pointer; font-weight: 700;
    }
    .topbar .title {
      font-weight: 800; font-size: 16px; margin-left: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      cursor: pointer; min-width: 0; flex-shrink: 1;
    }
    main#view {
      min-height: 0; height: 100%; display: flex; flex-direction: column;
      overflow: hidden; overflow-x: hidden; padding: 8px; gap: 10px;
      min-width: 0; max-width: 100%;
    }
    .hidden { display: none !important; }
    .bottom-actions, .revision-bar, .review-actions-bar {
      padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
      display: none; background: 0 0; border-top: 0;
    }
    .bottom-actions { gap: 8px; grid-template-columns: 1fr 1fr; }

    /* Boutons minimaux pour le premier rendu */
    .btn {
      background: var(--btn-bg, var(--btn-neutral-bg));
      color: var(--btn-fg, var(--btn-neutral-fg));
      border: 1px solid var(--btn-bd, var(--btn-neutral-bd));
      border-radius: var(--radius-md);
      padding: 10px 12px; font-weight: 900; cursor: pointer;
      width: 100%; appearance: none; outline: 0; font-size: 15px;
    }
    .btn--ghost {
      --btn-bg: transparent; --btn-fg: var(--muted); --btn-bd: var(--border);
    }
    .btn--primary {
      --btn-bg: var(--btn-soft-primary-bg);
      --btn-fg: var(--btn-soft-primary-fg);
      --btn-bd: var(--btn-soft-primary-bd);
    }
    .btn--solid.btn--primary {
      --btn-bg: var(--btn-solid-primary-bg);
      --btn-fg: var(--btn-solid-primary-fg);
      --btn-bd: var(--btn-solid-primary-bd);
    }
    .btn--tiny { padding: 6px 8px; font-size: 13px; border-radius: 8px; }
  </style>

  <!-- CSS complet chargé en non-bloquant -->
    <link rel="preload" href="css/01_styles_theme_and_layout.css?v=27d"

<body>

  <!-- Splash instantané -->
  <div id="splash">
    <div class="spinner"></div>
    <div style="font-size:13px;font-weight:600;color:var(--muted)">
      Chargement…
    </div>
  </div>

  <div class="wrapper">
    <div class="phone" id="app">
      <header class="topbar">
        <button class="back hidden" id="backBtn"
                title="Retour">← Retour</button>
        <div class="title" id="title">Deck</div>
        <div style="flex:1"></div>
        <button class="btn btn--ghost btn--tiny" id="syncBtn"
          style="flex-shrink:0;width:auto;padding:6px 12px"
          title="Sync">🔄</button>
        <a href="https://schedulepv.web.app/" target="_blank"
           rel="noopener"
           class="btn btn--primary btn--tiny"
           style="flex-shrink:0;text-decoration:none;
                  width:auto;padding:6px 12px">📅</a>
      </header>

      <main id="view"></main>

      <div class="bottom-actions" id="bottomActions">
        <button class="action btn" id="cardsBtn">Cartes</button>
        <button class="action btn" id="settingsBtn">Paramètres</button>
      </div>

      <footer class="revision-bar" id="revisionBar">
        <button id="startReviewBtn"
                class="rev-btn btn btn--solid btn--primary">
          Révision
        </button>
      </footer>

      <footer id="reviewActionsBar" class="review-actions-bar"
              aria-live="polite"></footer>
    </div>
  </div>

  <!-- MathJax config (aucun téléchargement ici) -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$','$'],['\\(','\\)']],
        displayMath: [['$$','$$'],['\\[','\\]']],
        processEscapes: true
      },
      options: { skipHtmlTags: ['script','style','textarea'] },
      startup: { typeset: false }
    };
    let _mathJaxLoading = null;
    window.loadMathJax = function() {
      if (window.MathJax?.typesetPromise) return Promise.resolve();
      if (_mathJaxLoading) return _mathJaxLoading;
      _mathJaxLoading = new Promise((res, rej) => {
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js';
        s.onload = function() {
          (function check() {
            window.MathJax?.typesetPromise ? res() : setTimeout(check, 50);
          })();
        };
        s.onerror = rej;
        document.head.appendChild(s);
      });
      return _mathJaxLoading;
    };
  </script>
